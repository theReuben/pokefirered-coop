name: Co-Op Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    # Nightly run at 09:00 UTC for the slower two-instance coop suite.
    - cron: "0 9 * * *"

jobs:
  # ── Job 1: C unit tests (native gcc) ─────────────────────────────────────────
  test-native:
    name: C Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install gcc
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc

      - name: Run C unit tests
        run: make check-native

  # ── Job 2: Relay server tests (Node + Vitest) ─────────────────────────────────
  test-relay:
    name: Relay Server Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: relay-server/package-lock.json

      - name: Run relay tests
        run: make check-relay

  # ── Job 3: ROM build verification (FireRed) + symbol extraction ───────────────
  test-rom:
    name: ROM Build + Symbol Extraction
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils-arm-none-eabi \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libpng-dev \
            python3

      - name: Cache build tools
        uses: actions/cache@v4
        with:
          path: |
            tools/bin2c/bin2c
            tools/gbafix/gbafix
            tools/gbagfx/gbagfx
            tools/jsonproc/jsonproc
            tools/mapjson/mapjson
            tools/mid2agb/mid2agb
            tools/preproc/preproc
            tools/ramscrgen/ramscrgen
            tools/rsfont/rsfont
            tools/scaninc/scaninc
            tools/trainerproc/trainerproc
            tools/compresSmol/compresSmol
            tools/compresSmol/compresSmolTilemap
            tools/wav2agb/wav2agb
          key: tools-${{ runner.os }}-${{ hashFiles('tools/*/Makefile', 'tools/**/*.c', 'tools/**/*.cpp', 'tools/**/*.h') }}

      - name: Build FireRed ROM
        run: make firered -j$(nproc) -O

      - name: Verify ROM output
        run: |
          test -f pokefirered.gba
          ACTUAL=$(wc -c < pokefirered.gba)
          echo "ROM size: $ACTUAL bytes"
          # FireRed ROM must be at least 16 MiB
          test "$ACTUAL" -ge 16777216

      - name: Extract symbols to Lua
        run: |
          python3 tools/extract_symbols.py pokefirered.map \
            test/lua/memory_map.lua
          echo "=== Generated memory_map.lua ==="
          cat test/lua/memory_map.lua

      - name: Upload ROM + map for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: rom
          path: |
            pokefirered.gba
            pokefirered.map
            test/lua/memory_map.lua
          retention-days: 1

  # ── Job 4: TypeScript type check ──────────────────────────────────────────────
  test-tauri-ts:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tauri-app/package-lock.json

      - name: Install tauri-app dependencies
        run: npm ci --prefix tauri-app --legacy-peer-deps

      - name: TypeScript type check
        working-directory: tauri-app
        run: npx tsc --noEmit

  # ── Job 5: Rust type check ────────────────────────────────────────────────────
  test-tauri-rust:
    name: Rust Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tauri-app/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('tauri-app/src-tauri/Cargo.lock') }}

      - name: Install system libs for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config

      - name: Cargo check
        run: make check-tauri

  # ── Job 6: Lua syntax check (mGBA integration test stubs) ────────────────────
  test-lua-syntax:
    name: Lua Script Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install luac
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends lua5.4

      - name: Syntax-check Lua test scripts
        run: |
          fail=0
          # Both top-level lua/ and the scenarios/ subdir.
          while IFS= read -r f; do
            echo "Checking $f ..."
            luac -p "$f" || fail=1
          done < <(find test/lua -name '*.lua' -print | sort)
          if [ $fail -ne 0 ]; then exit 1; fi
          echo "All Lua scripts passed syntax check."

  # ── Job 7: Headless mGBA scenario tests ──────────────────────────────────────
  # Drives the actual built ROM under xvfb and asserts via memory reads that
  # the in-ROM packet dispatcher behaves correctly. Catches regressions that
  # check-native cannot (real boot path, IWRAM placement, frame loop).
  test-lua:
    name: Headless mGBA Scenarios
    runs-on: ubuntu-latest
    needs: test-rom
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps + xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build xvfb lua5.4 \
            liblua5.4-dev libepoxy-dev libsdl2-dev \
            zlib1g-dev libpng-dev

      - name: Cache mGBA headless build
        id: mgba-cache
        uses: actions/cache@v4
        with:
          path: /tmp/mgba-build
          key: mgba-0.10.3-lua-${{ runner.os }}

      - name: Build mGBA headless with Lua support
        if: steps.mgba-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 -b 0.10.3 https://github.com/mgba-emu/mgba.git /tmp/mgba-src
          cmake -B /tmp/mgba-build -S /tmp/mgba-src -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SDL=OFF -DBUILD_QT=OFF \
            -DBUILD_HEADLESS=ON -DUSE_LUA=ON \
            -DUSE_DEBUGGERS=OFF -DUSE_GDB_STUB=OFF \
            -DBUILD_PYTHON=OFF -DBUILD_LIBRETRO=OFF
          cmake --build /tmp/mgba-build
          ls /tmp/mgba-build/

      - name: Verify mGBA has Lua scripting support
        run: |
          BIN=$(find /tmp/mgba-build -maxdepth 2 -name 'mgba-headless' -type f | head -1)
          if [ -z "$BIN" ]; then
            echo "FAIL: mgba-headless binary not found in /tmp/mgba-build"; exit 1
          fi
          echo "Found: $BIN"
          if ! "$BIN" --help 2>&1 | grep -qE -- '-S|--script'; then
            echo "FAIL: mgba-headless is missing Lua scripting support (-S flag)."
            exit 1
          fi
          echo "OK: mgba-headless has Lua scripting support."
          # Symlink to stable path for downstream steps
          ln -sf "$BIN" /tmp/mgba-build/mgba-headless || true

      - name: Download ROM artifact
        uses: actions/download-artifact@v4
        with:
          name: rom

      - name: Place ROM artifact in repo layout
        run: |
          # download-artifact unpacks to cwd; relocate test/lua/memory_map.lua
          # so the scenarios can require() it via the standard package.path.
          mkdir -p test/lua
          if [ -f memory_map.lua ]; then mv memory_map.lua test/lua/memory_map.lua; fi
          ls -la pokefirered.gba pokefirered.map test/lua/memory_map.lua

      - name: Run Lua scenarios
        run: make check-lua

  # ── Job 8: Two-instance coop scenarios (slow, on-demand) ─────────────────────
  # Boots two headless mGBA processes per scenario and bridges their ring
  # buffers. Manual or nightly runs only; per-push CI is too slow.
  test-coop:
    name: Two-Instance Coop Scenarios
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    needs: test-rom
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps + xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build xvfb python3 lua5.4 \
            liblua5.4-dev libepoxy-dev libsdl2-dev \
            zlib1g-dev libpng-dev

      - name: Cache mGBA headless build
        id: mgba-cache
        uses: actions/cache@v4
        with:
          path: /tmp/mgba-build
          key: mgba-0.10.3-lua-${{ runner.os }}

      - name: Build mGBA headless with Lua support
        if: steps.mgba-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 -b 0.10.3 https://github.com/mgba-emu/mgba.git /tmp/mgba-src
          cmake -B /tmp/mgba-build -S /tmp/mgba-src -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SDL=OFF -DBUILD_QT=OFF \
            -DBUILD_HEADLESS=ON -DUSE_LUA=ON \
            -DUSE_DEBUGGERS=OFF -DUSE_GDB_STUB=OFF \
            -DBUILD_PYTHON=OFF -DBUILD_LIBRETRO=OFF
          cmake --build /tmp/mgba-build

      - name: Locate mGBA headless binary
        run: |
          BIN=$(find /tmp/mgba-build -maxdepth 2 -name 'mgba-headless' -type f | head -1)
          if [ -z "$BIN" ]; then echo "FAIL: mgba-headless not found"; exit 1; fi
          ln -sf "$BIN" /tmp/mgba-build/mgba-headless || true
          echo "Using: $BIN"

      - name: Download ROM artifact
        uses: actions/download-artifact@v4
        with:
          name: rom

      - name: Place ROM artifact in repo layout
        run: |
          mkdir -p test/lua
          if [ -f memory_map.lua ]; then mv memory_map.lua test/lua/memory_map.lua; fi
          ls -la pokefirered.gba pokefirered.map test/lua/memory_map.lua

      - name: Run two-instance coop scenarios
        run: make check-coop

  # ── Job 9: Real-relay end-to-end smoke (Layer 4) ─────────────────────────────
  # Boots `npx partykit dev` against the real relay-server and walks two
  # Python WebSocket clients through role assignment, position relay,
  # flag_set broadcast, and boss_ready handshake. workflow_dispatch +
  # nightly only — partykit boot adds ~5s of overhead per run.
  test-relay-e2e:
    name: Relay Protocol Smoke (E2E)
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: relay-server/package-lock.json

      - name: Install relay-server deps
        run: npm install --prefix relay-server

      - name: Install Python WebSocket client
        run: pip install websockets

      - name: Run relay protocol smoke
        run: make check-relay-e2e
